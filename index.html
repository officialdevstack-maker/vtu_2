<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="/src/index.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendify</title>
    <!--
      Applies the last-known admin-configured brand title before React (or
      even the JS bundle) loads, so a repeat visit never flashes this static
      "Vendify" default. Reads the exact same localStorage key
      src/shared/branding.ts writes to after each successful /branding
      fetch — first-ever visit (nothing cached yet) still shows this
      fallback until that fetch resolves, which is unavoidable without SSR.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('vendify-branding-cache-v1');
          if (!raw) return;
          var cached = JSON.parse(raw);
          if (cached && cached.data && cached.data.meta_title) {
            document.title = cached.data.meta_title;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
