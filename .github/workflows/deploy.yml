name: Build and Deploy vtu_2 to cPanel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vtu_2/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vtu_2

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build
        working-directory: vtu_2
      
      - name: List files to be deployed
        run: ls -R vtu_2/dist/

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.4.0
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: ${{ secrets.CPANEL_PORT }}
          # FIX: The path must include the vtu_2 directory prefix
          local-dir: vtu_2/dist/
          server-dir: ${{ secrets.CPANEL_PATH_FRONTEND }}
          # Optional: add this if you want to ensure it uses SFTP/FTPS
          protocol: ftps